services:
  - type: web
    name: ineed-aristas-app
    env: r
    
    buildCommand: |
      apt-get update && apt-get install -y \
      libgdal-dev \
      libgeos-dev \
      libproj-dev \
      libudunits2-dev
      
      R -e "install.packages(c(
      'shiny',
      'shinydashboard',
      'dplyr',
      'tidyr',
      'data.table',
      'lme4',
      'lmerTest',
      'performance',
      'ggplot2',
      'plotly',
      'sf',
      'rnaturalearth',
      'rnaturalearthdata',
      'DT',
      'scales'
      ), repos='https://cloud.r-project.org')"
      
    startCommand: R -e "shiny::runApp(host='0.0.0.0', port=as.numeric(Sys.getenv('PORT')))"
